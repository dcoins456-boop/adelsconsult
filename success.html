<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Adels Consult</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="shortcut icon" href="assets/icons/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --brand-blue: #0504aa;
      --brand-gold: #edc531;
      --brand-black: #000000;
      --brand-white: #ffffff;
      --panel: #efeffd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Manrope", sans-serif;
      background: linear-gradient(180deg, var(--brand-blue) 0 88px, var(--brand-white) 88px 100%);
      color: var(--brand-black);
    }

    .card {
      width: min(640px, 100%);
      padding: 40px;
      border-radius: 20px;
      background: var(--panel);
      text-align: center;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 2.6rem);
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--brand-gold);
      color: var(--brand-black);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Thank you for your enquiry</h1>
    <p>Your quote request has been submitted successfully.</p>
    <p>We will review your details and get back to you as soon as possible.</p>
    <a href="/">Return to homepage</a>
  </main>
</body>
</html>
